name: Publish crates

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run only (do not publish)'
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: publish-crates-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check
        run: cargo check

      - name: Publish qefro-backend-sdk
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "::error::CARGO_REGISTRY_TOKEN secret is not set. Add it under Settings → Secrets and variables → Actions."
            echo "Create a token at https://crates.io/settings/tokens then paste it as the CARGO_REGISTRY_TOKEN repository secret."
            exit 1
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            cargo publish --dry-run
          else
            cargo publish
          fi
